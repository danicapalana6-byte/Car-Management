<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CarWash Pro | Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <main class="login-layout">
    <section class="login-hero">
      <img src="/client/image/logo.png" alt="CarWash Pro Logo" class="hero-logo">
      <p class="eyebrow">CarWash Pro</p>
      <h1>Administration Portal</h1>
      <p>Manage the public website experience with a cleaner backend dashboard for bookings, services, and promotions.</p>
    </section>
    <section class="login-card">
      <p class="eyebrow">Secure Access</p>
      <h2>Sign in to continue</h2>
      <form id="loginForm" class="form-grid single-column">
        <label>
          <span>Username</span>
          <input id="username" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" required>
        </label>
        <p id="msg" class="error-message hidden"></p>
        <button type="submit" class="primary-btn full-width">Sign In</button>
      </form>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
