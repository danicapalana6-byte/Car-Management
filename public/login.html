<!DOCTYPE html>
<html>

<head>
<title>CarWash Pro - Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="center">

<div class="box">

<h2>CarWash Pro</h2>
<p class="subtitle">Admin Login</p>

<input id="username" placeholder="Username" autocomplete="username">
<input id="password" type="password" placeholder="Password" autocomplete="current-password">

<p id="msg" style="color:#b91c1c; font-size:13px; margin:6px 0 0 0; display:none"></p>

<button type="button" onclick="login()">Login</button>

<script>
    // Login function - works even if admin.js fails
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');

        if (username === 'admin' && password === 'admin123') {
            localStorage.setItem('adminToken', 'admin-token-' + Date.now());
            window.location.href = 'dashboard.html';
        } else {
            msg.textContent = 'Invalid: username "admin", password "admin123"';
            msg.style.display = 'block';
        }
    }

    // Auto-hide msg on input
    document.querySelectorAll('#username, #password').forEach(input => {
        input.addEventListener('input', () => {
            document.getElementById('msg').style.display = 'none';
        });
    });
</script>

</div>

<script src="admin.js"></script>
</body>

</html>
