<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login - CarWash Pro</title>
  <link rel="stylesheet" href="2style.css">
</head>
<body class="center">
  <div class="box">
    <h2>CarWash Pro</h2>
    <p class="subtitle">Client Login</p>
    <input id="loginEmail" type="email" placeholder="Email or Username">
    <input id="loginPassword" type="password" placeholder="Password">
    <p id="loginMsg" style="color:#ffdddd;"></p>
    <button onclick="clientLogin()">Login</button>
    <div class="auth-links">
      <p>New? <a href="index.html">Sign up</a></p>
    </div>
  </div>
<script>
async function clientLogin() {
  const emailOrUser = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const msg = document.getElementById("loginMsg");
  if (!emailOrUser || !password) {
    msg.textContent = "Please fill all fields";
    return;
  }
  try {
    const res = await fetch("/api/clientAuth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({email: emailOrUser, username: emailOrUser, password})
    });
    const data = await res.json();
    if (res.ok) {
      // Save to localStorage
      localStorage.setItem("clientName", data.user.name);
      localStorage.setItem("clientUsername", data.user.username);
      localStorage.setItem("clientEmail", data.user.email);
      localStorage.setItem("clientToken", data.token);
      msg.style.color = "#00ff95";
      msg.textContent = "Login successful! Redirecting...";
      setTimeout(() => window.location.href = "dashboard.html", 1500);
    } else {
      msg.textContent = data.message || "Login failed";
    }
  } catch (err) {
    msg.textContent = "Server error";
    console.error(err);
  }
}
</script>
</body>
</html>
