<!DOCTYPE html>
<html>
<head>
  <title>Client Sign Up</title>
  <link rel="stylesheet" href="2style.css">
</head>

<body class="center">

<div class="box">
  <h2>CarWash Pro</h2>
  <p class="subtitle">Client Sign Up</p>

  <input id="name" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <p id="msg" style="color:#ffdddd;"></p>

  <button onclick="signup()">Register</button>

  <!-- NEW AUTH LINKS -->
  <div class="auth-links">
    <a href="forgot-password.html">Forgot Password?</a>
    <p>Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<script>
async function signup(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");

  if(!name || !email || !username || !password){
    msg.textContent = "Please fill all fields";
    return;
  }

  try{

    const res = await fetch("/api/clientAuth/signup",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({name,email,username,password})
    });

    const data = await res.json();

    if(res.ok){

      // Save user
      localStorage.setItem("clientName", name);
      localStorage.setItem("clientUsername", username);
      localStorage.setItem("clientEmail", email);
      localStorage.setItem("clientToken", "demo-token");

      // Better UX (no alert)
      msg.style.color = "#00ff95";
      msg.textContent = "Registration successful! Redirecting...";

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },1500);

    }else{
      msg.textContent = data.message || "Signup failed";
    }

  }catch(err){
    msg.textContent = "Server error";
    console.error(err);
  }
}
</script>

</body>
</html>
